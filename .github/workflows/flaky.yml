name: Ghidra Flaky Commit Validator

on:
  workflow_dispatch:

jobs:
  flaky-check:
    runs-on: ubuntu-latest

    timeout-minutes: 180

    steps:

      ####################################################
      # Checkout
      ####################################################
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      ####################################################
      # Setup JDK
      ####################################################
      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      ####################################################
      # Prepare commits
      ####################################################
      - name: Prepare commits
        run: |
          cd $GITHUB_WORKSPACE

          TARGET=deec8bcf06803dcd08d22683354692c06530e468

          git fetch --all --tags

          echo "TARGET=$TARGET" >> $GITHUB_ENV

          PARENT=$(git log -n 1 --pretty=%P $TARGET | awk '{print $1}')

          echo "PARENT=$PARENT" >> $GITHUB_ENV

          echo "TARGET=$TARGET"
          echo "PARENT=$PARENT"

      ####################################################
      # DEBUG (VERY IMPORTANT)
      ####################################################
      - name: Debug
        run: |
          cd $GITHUB_WORKSPACE
          pwd
          ls -lah
          find . -name gradlew

      ####################################################
      # ================= PARENT =================
      ####################################################

      - name: Parent build + test
        run: |
          cd $GITHUB_WORKSPACE

          git checkout $PARENT

          chmod +x ./gradlew

          ./gradlew -I gradle/support/fetchDependencies.gradle \
            -DhideDownloadProgress -DnoEclipse

          ./gradlew buildGhidra --parallel

          mkdir -p results/parent

          for i in {1..3}; do
            echo "PARENT RUN $i"

            ./gradlew test --no-daemon \
              > results/parent/run_$i.log 2>&1

            echo $? >> results/parent/status.txt
          done

      ####################################################
      # ================= TARGET =================
      ####################################################

      - name: Target build + test
        run: |
          cd $GITHUB_WORKSPACE

          git checkout $TARGET

          chmod +x ./gradlew

          ./gradlew -I gradle/support/fetchDependencies.gradle \
            -DhideDownloadProgress -DnoEclipse

          ./gradlew buildGhidra --parallel

          mkdir -p results/target

          for i in {1..3}; do
            echo "TARGET RUN $i"

            ./gradlew test --no-daemon \
              > results/target/run_$i.log 2>&1

            echo $? >> results/target/status.txt
          done

      ####################################################
      # Upload
      ####################################################
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: ghidra-flaky-results
          path: results/
