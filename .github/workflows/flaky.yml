name: Ghidra Flaky Commit Validator

on:
  workflow_dispatch:

jobs:
  flaky-check:
    runs-on: ubuntu-latest

    timeout-minutes: 180

    steps:

      ####################################################
      # Checkout FULL repo
      ####################################################
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      ####################################################
      # Setup Java (Ghidra = Java 21)
      ####################################################
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      ####################################################
      # Commit setup
      ####################################################
      - name: Prepare commits
        run: |
          TARGET=deec8bcf06803dcd08d22683354692c06530e468
          echo "TARGET=$TARGET" >> $GITHUB_ENV

          PARENT=$(git rev-parse ${TARGET}^)
          echo "PARENT=$PARENT" >> $GITHUB_ENV

          echo "TARGET=$TARGET"
          echo "PARENT=$PARENT"

      ####################################################
      # IMPORTANT DEBUG: confirm gradlew exists
      ####################################################
      - name: Locate gradlew
        run: |
          echo "=== ROOT FILES ==="
          ls -lah

          echo "=== FIND GRADLEW ==="
          find . -name gradlew

      ####################################################
      # Make gradlew executable
      ####################################################
      - name: Make gradlew executable
        run: |
          chmod +x ./gradlew

      ####################################################
      # PARENT BUILD
      ####################################################
      - name: Checkout parent
        run: git checkout $PARENT

      - name: Build parent
        run: |
          ./gradlew clean build --no-daemon

      - name: Run parent tests
        run: |
          mkdir -p results/parent

          for i in {1..3}; do
            ./gradlew test --no-daemon \
              > results/parent/run_$i.log 2>&1
            echo $? >> results/parent/status.txt
          done

      ####################################################
      # TARGET BUILD
      ####################################################
      - name: Checkout target
        run: git checkout $TARGET

      - name: Build target
        run: |
          ./gradlew clean build --no-daemon

      - name: Run target tests
        run: |
          mkdir -p results/target

          for i in {1..3}; do
            ./gradlew test --no-daemon \
              > results/target/run_$i.log 2>&1
            echo $? >> results/target/status.txt
          done

      ####################################################
      # Upload results
      ####################################################
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: ghidra-flaky-results
          path: results/
