name: Flaky Commit Validator (Ghidra based)

on:
  workflow_dispatch:

jobs:
  flaky-check:
    runs-on: ubuntu-latest

    steps:
      ####################################################
      # Checkout
      ####################################################
      - uses: actions/checkout@v6

      ####################################################
      # Detect JDK version
      ####################################################
      - name: Read Ghidra JDK Version
        run: echo "JDK_VER=$(awk -F'=' '$1==\"application.java.min\" {print $2}' Ghidra/application.properties)" >> $GITHUB_ENV

      ####################################################
      # Setup JDK
      ####################################################
      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '${{ env.JDK_VER }}'

      ####################################################
      # Prepare commits
      ####################################################
      - name: Prepare commits
        run: |
          TARGET=deec8bcf06803dcd08d22683354692c06530e468

          echo "TARGET=$TARGET" >> $GITHUB_ENV

          PARENT=$(git rev-parse ${TARGET}^)
          echo "PARENT=$PARENT" >> $GITHUB_ENV

          echo "TARGET=$TARGET"
          echo "PARENT=$PARENT"

      ####################################################
      # Fetch dependencies
      ####################################################
      - name: Fetch Dependencies (parent)
        run: |
          git checkout $PARENT
          ./gradlew -I gradle/support/fetchDependencies.gradle -DhideDownloadProgress -DnoEclipse

      ####################################################
      # Build parent
      ####################################################
      - name: Build parent
        run: |
          git checkout $PARENT
          ./gradlew buildGhidra --parallel

      ####################################################
      # Run parent tests (rerun)
      ####################################################
      - name: Run parent tests repeatedly
        run: |
          mkdir -p results/parent

          git checkout $PARENT

          for i in {1..3}; do
            echo "PARENT RUN $i"

            ./gradlew test --no-daemon \
              > results/parent/run_$i.log 2>&1

            echo $? >> results/parent/status.txt
          done

      ####################################################
      # Fetch dependencies (target)
      ####################################################
      - name: Fetch Dependencies (target)
        run: |
          git checkout $TARGET
          ./gradlew -I gradle/support/fetchDependencies.gradle -DhideDownloadProgress -DnoEclipse

      ####################################################
      # Build target
      ####################################################
      - name: Build target
        run: |
          git checkout $TARGET
          ./gradlew buildGhidra --parallel

      ####################################################
      # Run target tests repeatedly
      ####################################################
      - name: Run target tests repeatedly
        run: |
          mkdir -p results/target

          git checkout $TARGET

          for i in {1..3}; do
            echo "TARGET RUN $i"

            ./gradlew test --no-daemon \
              > results/target/run_$i.log 2>&1

            echo $? >> results/target/status.txt
          done

      ####################################################
      # Upload results
      ####################################################
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: ghidra-flaky-results
          path: results/
