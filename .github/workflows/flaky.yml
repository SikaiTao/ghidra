name: Ghidra Flaky Commit Validator

on:
  workflow_dispatch:

jobs:
  flaky-check:
    runs-on: ubuntu-latest

    timeout-minutes: 180

    steps:

      ####################################################
      # Checkout
      ####################################################
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      ####################################################
      # Setup JDK (MD says JDK 11 minimum, but safe 11/17)
      ####################################################
      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      ####################################################
      # Install Gradle (IMPORTANT: system gradle, not wrapper)
      ####################################################
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      ####################################################
      # Prepare commits
      ####################################################
      - name: Prepare commits
        run: |
          TARGET=deec8bcf06803dcd08d22683354692c06530e468

          git fetch --all --tags

          echo "TARGET=$TARGET" >> $GITHUB_ENV

          PARENT=$(git log -n 1 --pretty=%P $TARGET | awk '{print $1}')

          echo "PARENT=$PARENT" >> $GITHUB_ENV

          echo "TARGET=$TARGET"
          echo "PARENT=$PARENT"

      ####################################################
      # ================= PARENT =================
      ####################################################

      - name: Build parent
        run: |
          git checkout $PARENT

          gradle -I gradle/support/fetchDependencies.gradle init

          gradle buildGhidra

      - name: Run parent tests
        run: |
          mkdir -p results/parent
          git checkout $PARENT

          for i in {1..3}; do
            echo "PARENT RUN $i"

            gradle test > results/parent/run_$i.log 2>&1

            echo $? >> results/parent/status.txt
          done

      ####################################################
      # ================= TARGET =================
      ####################################################

      - name: Build target
        run: |
          git checkout $TARGET

          gradle -I gradle/support/fetchDependencies.gradle init

          gradle buildGhidra

      - name: Run target tests
        run: |
          mkdir -p results/target
          git checkout $TARGET

          for i in {1..3}; do
            echo "TARGET RUN $i"

            gradle test > results/target/run_$i.log 2>&1

            echo $? >> results/target/status.txt
          done

      ####################################################
      # Upload
      ####################################################
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: ghidra-flaky-results
          path: results/
