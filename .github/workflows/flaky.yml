name: Ghidra Flaky Commit Validator

on:
  workflow_dispatch:

jobs:
  flaky-check:
    runs-on: ubuntu-latest

    timeout-minutes: 180

    steps:

      ####################################################
      # Checkout repo
      ####################################################
      - name: Checkout repo
        uses: actions/checkout@v6

      ####################################################
      # Setup JDK 
      ####################################################
      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      ####################################################
      # Prepare commits
      ####################################################
      - name: Prepare commits
        run: |
          TARGET=deec8bcf06803dcd08d22683354692c06530e468

          echo "TARGET=$TARGET" >> $GITHUB_ENV

          PARENT=$(git rev-parse ${TARGET}^)
          echo "PARENT=$PARENT" >> $GITHUB_ENV

          echo "Target commit: $TARGET"
          echo "Parent commit: $PARENT"

      ####################################################
      # DEBUG (verify repo structure)
      ####################################################
      - name: Debug repo structure
        run: |
          ls -lah
          find . -maxdepth 2 -name gradlew
          find . -maxdepth 2 -name build.gradle

      ####################################################
      # Make gradlew executable
      ####################################################
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      ####################################################
      # PARENT: fetch dependencies
      ####################################################
      - name: Fetch dependencies (parent)
        run: |
          git checkout $PARENT
          ./gradlew -I gradle/support/fetchDependencies.gradle \
            -DhideDownloadProgress -DnoEclipse

      ####################################################
      # PARENT: build
      ####################################################
      - name: Build parent
        run: |
          git checkout $PARENT
          ./gradlew buildGhidra --parallel

      ####################################################
      # PARENT: rerun tests
      ####################################################
      - name: Run parent tests repeatedly
        run: |
          mkdir -p results/parent

          git checkout $PARENT

          for i in {1..3}; do
            echo "PARENT RUN $i"

            ./gradlew test --no-daemon \
              > results/parent/run_$i.log 2>&1

            echo $? >> results/parent/status.txt
          done

      ####################################################
      # TARGET: fetch dependencies
      ####################################################
      - name: Fetch dependencies (target)
        run: |
          git checkout $TARGET
          ./gradlew -I gradle/support/fetchDependencies.gradle \
            -DhideDownloadProgress -DnoEclipse

      ####################################################
      # TARGET: build
      ####################################################
      - name: Build target
        run: |
          git checkout $TARGET
          ./gradlew buildGhidra --parallel

      ####################################################
      # TARGET: rerun tests
      ####################################################
      - name: Run target tests repeatedly
        run: |
          mkdir -p results/target

          git checkout $TARGET

          for i in {1..3}; do
            echo "TARGET RUN $i"

            ./gradlew test --no-daemon \
              > results/target/run_$i.log 2>&1

            echo $? >> results/target/status.txt
          done

      ####################################################
      # Upload results
      ####################################################
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: ghidra-flaky-results
          path: results/
