name: Ghidra Flaky Commit Validator

on:
  workflow_dispatch:

jobs:
  flaky-check:
    runs-on: ubuntu-latest

    timeout-minutes: 180

    steps:

      ####################################################
      # Checkout full history (CRITICAL)
      ####################################################
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      ####################################################
      # Setup JDK (match official CI)
      ####################################################
      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      ####################################################
      # Prepare commits (FIXED parent resolution)
      ####################################################
      - name: Prepare commits
        run: |
          TARGET=deec8bcf06803dcd08d22683354692c06530e468

          git fetch --all --tags

          echo "TARGET=$TARGET" >> $GITHUB_ENV

          # robust parent resolution (NO rev-parse ^)
          PARENT=$(git log -n 1 --pretty=%P $TARGET | awk '{print $1}')

          if [ -z "$PARENT" ]; then
            echo "ERROR: Cannot resolve parent commit"
            exit 1
          fi

          echo "PARENT=$PARENT" >> $GITHUB_ENV

          echo "TARGET=$TARGET"
          echo "PARENT=$PARENT"

      ####################################################
      # Debug (verify repo correctness)
      ####################################################
      - name: Debug repo
        run: |
          ls -lah
          find . -name gradlew
          git --no-pager log -1 --oneline $TARGET

      ####################################################
      # Make gradlew executable
      ####################################################
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      ####################################################
      # ===================== PARENT =====================
      ####################################################

      - name: Checkout parent
        run: git checkout $PARENT

      - name: Fetch dependencies (parent)
        run: |
          ./gradlew -I gradle/support/fetchDependencies.gradle \
            -DhideDownloadProgress -DnoEclipse

      - name: Build parent
        run: |
          ./gradlew buildGhidra --parallel

      - name: Run parent tests repeatedly
        run: |
          mkdir -p results/parent

          for i in {1..3}; do
            echo "PARENT RUN $i"

            ./gradlew test --no-daemon \
              > results/parent/run_$i.log 2>&1

            echo $? >> results/parent/status.txt
          done

      ####################################################
      # ===================== TARGET =====================
      ####################################################

      - name: Checkout target
        run: git checkout $TARGET

      - name: Fetch dependencies (target)
        run: |
          ./gradlew -I gradle/support/fetchDependencies.gradle \
            -DhideDownloadProgress -DnoEclipse

      - name: Build target
        run: |
          ./gradlew buildGhidra --parallel

      - name: Run target tests repeatedly
        run: |
          mkdir -p results/target

          for i in {1..3}; do
            echo "TARGET RUN $i"

            ./gradlew test --no-daemon \
              > results/target/run_$i.log 2>&1

            echo $? >> results/target/status.txt
          done

      ####################################################
      # Upload results
      ####################################################
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: ghidra-flaky-results
          path: results/
