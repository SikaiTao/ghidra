name: Ghidra Flaky Commit Validator

on:
  workflow_dispatch:

jobs:
  flaky-check:
    runs-on: ubuntu-latest

    timeout-minutes: 120

    steps:

      ####################################################
      # Checkout
      ####################################################
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      ####################################################
      # JDK (Ghidra requires Java 21+ in modern versions)
      ####################################################
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      ####################################################
      # Prepare commit
      ####################################################
      - name: Prepare commits
        run: |
          TARGET=deec8bcf06803dcd08d22683354692c06530e468

          echo "TARGET=$TARGET" >> $GITHUB_ENV
          PARENT=$(git rev-parse ${TARGET}^)

          echo "PARENT=$PARENT" >> $GITHUB_ENV

          echo "Target: $TARGET"
          echo "Parent: $PARENT"

      ####################################################
      # Debug structure (VERY important for research)
      ####################################################
      - name: Show repo structure
        run: |
          pwd
          ls -lah
          find . -maxdepth 2 -name gradlew
          find . -maxdepth 2 -name build.gradle

      ####################################################
      # Make gradlew executable
      ####################################################
      - name: Make gradlew executable
        run: chmod +x gradlew

      ####################################################
      # PARENT BUILD
      ####################################################
      - name: Checkout parent
        run: git checkout $PARENT

      - name: Build parent
        run: |
          ./gradlew clean build --no-daemon

      - name: Run parent tests repeatedly
        run: |
          mkdir -p results/parent

          for i in {1..3}; do
            echo "PARENT RUN $i"

            ./gradlew test --no-daemon \
              > results/parent/run_$i.log 2>&1

            echo $? >> results/parent/status.txt
          done

      ####################################################
      # TARGET BUILD
      ####################################################
      - name: Checkout target
        run: git checkout $TARGET

      - name: Build target
        run: |
          ./gradlew clean build --no-daemon

      - name: Run target tests repeatedly
        run: |
          mkdir -p results/target

          for i in {1..3}; do
            echo "TARGET RUN $i"

            ./gradlew test --no-daemon \
              > results/target/run_$i.log 2>&1

            echo $? >> results/target/status.txt
          done

      ####################################################
      # Compare results
      ####################################################
      - name: Compare results
        run: |
          echo "===== PARENT ====="
          cat results/parent/status.txt || true

          echo "===== TARGET ====="
          cat results/target/status.txt || true

      ####################################################
      # Upload artifacts
      ####################################################
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: ghidra-flaky-results
          path: results/
